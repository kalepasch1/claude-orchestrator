name: Supabase branch digital-twin

# Create an isolated Supabase branch when a PR is opened and delete it on close/merge.
# The branch URL is injected into the Vercel preview as SUPABASE_URL so every PR
# gets its own DB copy (no prod data in review apps, no review writes in prod).
#
# Required repo secrets:
#   SUPABASE_ACCESS_TOKEN   – personal access token from app.supabase.com/account/tokens
#   SUPABASE_PROJECT_REF    – project ref (e.g. eatfwdzfurujcuwlhdgj)
#   SUPABASE_DB_PASSWORD    – DB password (for CLI auth)
#   VERCEL_TOKEN            – Vercel API token
#   VERCEL_ORG_ID           – Vercel org/team ID
#   VERCEL_PROJECT_ID       – Vercel project ID

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

jobs:
  supabase-branch:
    name: ${{ github.event.action == 'closed' && 'Delete' || 'Create' }} Supabase preview branch
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      PR_NUMBER: ${{ github.event.number }}
      BRANCH_NAME: pr-${{ github.event.number }}

    steps:
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # ── PR opened / reopened / synchronized ───────────────────────────────
      - name: Create Supabase branch
        if: github.event.action != 'closed'
        run: |
          supabase branches create "$BRANCH_NAME" \
            --project-ref "$PROJECT_REF" \
            --experimental 2>&1 | tee branch-output.txt || true
          echo "branch_created=true" >> "$GITHUB_ENV"

      - name: Get branch DB URL
        if: github.event.action != 'closed'
        id: branch-url
        run: |
          # Poll up to 60 s for the branch to become healthy
          for i in $(seq 1 12); do
            STATUS=$(supabase branches get "$BRANCH_NAME" \
              --project-ref "$PROJECT_REF" \
              --experimental --output json 2>/dev/null | jq -r '.status // "unknown"')
            echo "Branch status: $STATUS (attempt $i)"
            if [ "$STATUS" = "ACTIVE_HEALTHY" ]; then
              DB_HOST=$(supabase branches get "$BRANCH_NAME" \
                --project-ref "$PROJECT_REF" \
                --experimental --output json | jq -r '.db_host')
              echo "db_host=$DB_HOST" >> "$GITHUB_OUTPUT"
              echo "BRANCH_DB_HOST=$DB_HOST" >> "$GITHUB_ENV"
              break
            fi
            sleep 5
          done

      - name: Update Vercel preview env (SUPABASE_URL)
        if: github.event.action != 'closed' && steps.branch-url.outputs.db_host != ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          SUPABASE_BRANCH_URL="https://${{ steps.branch-url.outputs.db_host }}"
          # Remove any existing per-branch override, then add the new one
          curl -sf -X DELETE \
            "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env?gitBranch=$BRANCH_NAME&key=SUPABASE_URL" \
            -H "Authorization: Bearer $VERCEL_TOKEN" || true
          curl -sf -X POST \
            "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"SUPABASE_URL\",\"value\":\"$SUPABASE_BRANCH_URL\",\"type\":\"plain\",\"target\":[\"preview\"],\"gitBranch\":\"$BRANCH_NAME\"}"
          echo "Vercel preview SUPABASE_URL → $SUPABASE_BRANCH_URL"

      - name: Comment on PR with branch info
        if: github.event.action == 'opened' && steps.branch-url.outputs.db_host != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🗄️ **Supabase preview branch created**\n\nBranch: \`pr-${context.issue.number}\`\nDB host: \`${{ steps.branch-url.outputs.db_host }}\`\n\nThe Vercel preview for this PR will use an isolated copy of the database. Any migrations on this branch will not affect production.`
            })

      # ── PR closed / merged ─────────────────────────────────────────────────
      - name: Delete Supabase branch
        if: github.event.action == 'closed'
        run: |
          supabase branches delete "$BRANCH_NAME" \
            --project-ref "$PROJECT_REF" \
            --experimental 2>&1 || echo "Branch already gone or delete failed (non-fatal)"

      - name: Remove Vercel preview env override
        if: github.event.action == 'closed'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          curl -sf -X DELETE \
            "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env?gitBranch=$BRANCH_NAME&key=SUPABASE_URL" \
            -H "Authorization: Bearer $VERCEL_TOKEN" || true
          echo "Removed Vercel preview SUPABASE_URL override for branch $BRANCH_NAME"
