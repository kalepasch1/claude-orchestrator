name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  darwin-kernel:
    name: darwin-kernel — test + typecheck
    runs-on: ubuntu-latest
    container:
      image: node:22-alpine
    defaults:
      run:
        working-directory: packages/darwin-kernel

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: node --test --experimental-strip-types test/*.test.ts

      - name: Typecheck
        run: npx tsc --noEmit
